name: OpenAPI Preview
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '*.json'
      - '!PostmanCollections/**'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to test (leave empty for current branch)'
        required: false
        type: number
jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber, headSha, baseRef;
            
            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
              headSha = context.payload.pull_request.head.sha;
              baseRef = context.payload.pull_request.base.ref;
            } else if (context.eventName === 'workflow_dispatch') {
              prNumber = context.payload.inputs.pr_number || null;
              if (!prNumber) {
                core.setFailed('PR number required for manual dispatch');
                return;
              }
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              headSha = pr.head.sha;
              baseRef = pr.base.ref;
            }
            
            core.setOutput('pr_number', prNumber);
            core.setOutput('head_sha', headSha);
            core.setOutput('base_ref', baseRef);

      - name: Get changed JSON files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ steps.pr.outputs.base_ref }}...HEAD -- '*.json' ':(exclude)PostmanCollections/**' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "count=$(echo $FILES | jq length)" >> $GITHUB_OUTPUT

      - name: Post preview comment
        if: steps.changed.outputs.count != '0'
        uses: actions/github-script@v7
        env:
          FILES_JSON: ${{ steps.changed.outputs.files }}
          SHA: ${{ steps.pr.outputs.head_sha }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        with:
          script: |
            const files = JSON.parse(process.env.FILES_JSON)
            const sha = process.env.SHA
            const prNumber = process.env.PR_NUMBER
            const base = 'https://vtexhelp.myvtex.com'

            const links = files.map(file => {
              const rawUrl = `https://raw.githubusercontent.com/vtex/openapi-schemas/${sha}/${encodeURIComponent(file)}`
              const previewUrl = `${base}/admin/app/docs/api-reference/preview?url=${encodeURIComponent(rawUrl)}`
              return `- [${file}](${previewUrl})`
            }).join('\n')

            const body = [
              '## OpenAPI Preview',
              '',
              'Preview the changed specs:',
              '',
              links,
              '',
              `> Links point to commit \`${sha.slice(0, 7)}\`. They will update on each new push to this PR.`,
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })

            const existing = comments.find(c => c.body.includes('## OpenAPI Preview'))

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              })
            }
